<span class="group relative inline-flex align-middle">
  <span class="grid h-4 w-4 place-items-center rounded-full border border-slate-300 text-[10px] font-semibold text-slate-500 cursor-help"
        tabindex="0"
        aria-label="{{ text }}"
        title="{{ text }}">i</span>
  <span class="pointer-events-none absolute left-0 top-full z-20 mt-2 hidden w-72 rounded-md border border-slate-200 bg-white px-3 py-2 text-xs font-normal leading-relaxed text-slate-600 shadow-lg group-hover:block group-focus-within:block">
    {{ text }}
  </span>
</span>
